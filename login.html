<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - GRIFA Games</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .auth-container {
            max-width: 400px;
            margin: 100px auto;
            padding: 40px;
            background: var(--bg-card);
            border-radius: var(--radius);
            border: 1px solid var(--border-color);
            text-align: center;
        }

        .google-btn {
            width: 100%;
            padding: 12px;
            background: white;
            color: #444;
            border: 1px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-weight: 600;
            margin-top: 20px;
            transition: 0.3s;
        }

        .google-btn:hover {
            background: #f5f5f5;
        }

        .divider {
            margin: 25px 0;
            display: flex;
            align-items: center;
            color: var(--text-secondary);
        }

        .divider::before,
        .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: var(--border-color);
            margin: 0 10px;
        }
    </style>
</head>

<body>
    <div class="auth-container">
        <h1 class="brand-font">GRIFA <span>GAMES</span></h1>
        <p style="margin: 15px 0; color: var(--text-secondary);">سجل دخولك الآن للبدء بالشراء</p>

        <button class="google-btn" id="google-login">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20">
            الدخول عبر Google
        </button>

        <div class="divider">أو عبر البريد</div>

        <form id="login-form">
            <div class="input-group">
                <input type="email" placeholder="البريد الإلكتروني" required id="auth-email">
                <i class="fa-solid fa-envelope"></i>
            </div>
            <div class="input-group">
                <input type="password" placeholder="كلمة المرور" required id="auth-password">
                <i class="fa-solid fa-lock"></i>
            </div>
            <button type="submit" class="btn-primary" id="auth-btn">دخول / تسجيل</button>
        </form>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="auth.js"></script>
</body>

</html>
